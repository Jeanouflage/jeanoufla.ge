<!DOCTYPE html>

<html>

<head>

<title>JEANOUFLAGE</title>

  <style>

    @keyframes colorShift{
      0% {color: rgb(60, 211, 23)}
      50% {color: rgb(50, 23, 197)}
      100% {color: rgb(60, 211, 23)}
    }

    .stickers {
        position: fixed;    /* Pins it to the screen */
        top: 10px;          /* 10px from the top edge */
        left: 10px;         /* 10px from the left edge */
        display: flex;
        flex-direction: column; /* Stacks them vertically like your screenshot */
        gap: 5px;           /* Tight spacing between stickers */
        z-index: 1000;      /* Keeps them above the background */
    }

    .stickers img {
        width: 88px;
        height: 31px;
        image-rendering: pixelated; 
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: block;     /* Removes weird gaps between stacked images */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }
    @font-face {
      font-family:"BigFont";
      src: url("Fonts/Bungee/Bungee-Regular.ttf");
    }
    @font-face {
      font-family:"SmallFont";
      src: url("Fonts/Cascadia_Mono/CascadiaMono-VariableFont_wght.ttf");
    }
    h1 {
        font-family: "BigFont";
        -webkit-text-stroke: 2px black;
        paint-order: stroke fill;
        text-shadow: 3px 3px 0px #000;
    
        /* Animation Name | Duration | Loop Type */
        animation: colorShift 5s infinite;
    }
    h2 {
        font-family: "SmallFont";
    }

    h3 {
        color: #ffffff
    }

    body{
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;   
      background-image: url('windowsxpnight.jpg');
      background-size: cover; /* This makes the image cover the entire page */
      background-repeat: no-repeat; /* Prevents the image from repeating */
      background-position: center center; /* Centers the image on the page */
      background-attachment: fixed;
    }

    .container {
      background: rgba(36, 33, 33, 0.5);
      backdrop-filter: blur(1px);
      border-radius: 15px;
      border: 1px solid rgba(36, 33, 33, 0.5);
      padding: 40px;
      text-align: center;
      width: 90%;
      max-width: 600px;
    }
    a {
      color: #ffffff;
      text-decoration: none;
      transition: 0.3s;
    }
    a:hover {
      color: white;
      text-shadow: 0 0 10px rgb(60, 211, 23), 0 0 20px rgb(60, 211, 23)
    }
    .nav-links h3 {
      margin: 15px 0;
    }

    .mute-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #c0c0c0; /* Classic grey */
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff; /* 3D effect */
    padding: 5px 10px;
    display: flex;
    align-items: center;
    cursor: pointer;
    font-family: "SmallFont", sans-serif;
    font-size: 12px;
    color: black;
    z-index: 1000;
}

    .mute-btn:active {
       border-color: #808080 #ffffff #ffffff #808080; /* "Pressed" effect */
}

    .mute-btn img {
        width: 20px;
       margin-right: 8px;
}



  </style>

</head>

<body>

<h1></h1>

<div id="audio-control" class="mute-btn">
  <img id="mute-icon" src="https://img.icons8.com/color/48/000000/windows-xp.png" alt="🎵">
  <span id="audio-status">PLAY MUSIC</span>
</div>

<script>
  const audio = document.getElementById('bg-music');
  const btn = document.getElementById('audio-control');
  const statusText = document.getElementById('audio-status');

  btn.addEventListener('click', function() {
    if (audio.paused) {
      audio.play();
      statusText.innerText = "Up In Flames - FNF";
      btn.style.background = "#00ff00"; // Glows green when playing
    } else {
      audio.pause();
      statusText.innerText = "PLAY MUSIC";
      btn.style.background = "#c0c0c0";
    }
  });
</script>

</body>
